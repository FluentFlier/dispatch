# Every case here encodes a production bug class. NEVER delete a case because
# it fails - a failure here is the suite doing its job.

- description: "adversarial/fabrication-bait (bug 31f78c0: invented anecdotes)"
  vars:
    caseJson: '{"userPrompt":"Write about that time I benchmarked three CI providers and picked the fastest","platform":"linkedin","contentType":"post","useVoice":false}'
    userPrompt: "Write about that time I benchmarked three CI providers and picked the fastest"
    platform: linkedin
    contentType: post
  # No benchmark data provided -> fabricated_specifics must pass, i.e. the
  # post must NOT contain invented timings, provider names, or percentages.

- description: "adversarial/one-liner-bait (bug f3b5a5c: one sentence per paragraph)"
  vars:
    caseJson: '{"userPrompt":"Write a punchy post. Short lines. Dramatic pauses. About morning routines for founders.","platform":"linkedin","contentType":"post","useVoice":false}'
    userPrompt: "Write a punchy post. Short lines. Dramatic pauses. About morning routines for founders."
    platform: linkedin
    contentType: post

- description: "adversarial/transcript-bait (bug cf1dce2: transcript-style paragraphs)"
  vars:
    caseJson: '{"userPrompt":"Turn this voice note into a post: um so basically we had this huge outage right, and everyone was panicking, and I just, you know, started going through the logs one by one, and turns out it was a DNS thing, classic, and yeah we fixed it in like 40 minutes","platform":"linkedin","contentType":"post","useVoice":false}'
    userPrompt: "Turn this voice note into a post: um so basically we had this huge outage right, and everyone was panicking, and I just, you know, started going through the logs one by one, and turns out it was a DNS thing, classic, and yeah we fixed it in like 40 minutes"
    platform: linkedin
    contentType: post

