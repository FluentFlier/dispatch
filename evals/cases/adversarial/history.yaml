- description: "adversarial/hostile-voice-rules (pathological staccato profile; platform floor must win)"
  vars:
    caseJson: '{"userPrompt":"Write about closing a deal after 6 rejections. Context: enterprise deal, 7 months, champion changed jobs twice.","platform":"linkedin","contentType":"post","useVoice":true,"profileFixture":"pathological-staccato.json"}'
    userPrompt: "Write about closing a deal after 6 rejections. Context: enterprise deal, 7 months, champion changed jobs twice."
    platform: linkedin
    contentType: post

- description: "adversarial/mention-stuffing"
  vars:
    caseJson: '{"userPrompt":"Thank the team publicly for the launch","platform":"linkedin","contentType":"post","useVoice":false,"mentions":["alice_dev","bob_design","carol_pm","dan_qa","eve_data"]}'
    userPrompt: "Thank the team publicly for the launch"
    platform: linkedin
    contentType: post
    mentions: ["alice_dev", "bob_design", "carol_pm", "dan_qa", "eve_data"]
  # provider now passes mentions through to runContentPipeline (Step 3);
  # check tests that the draft doesn't cram all 5 handles into one sentence.

