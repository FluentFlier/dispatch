# Declarative InsForge config for Dispatch / Content OS (project dispatch / mm4nbzdu)
# Apply: npx @insforge/cli config apply --auto-approve

[auth]
require_email_verification = false
verify_email_method = "code"
reset_password_method = "code"
allowed_redirect_urls = [
  "http://localhost:3001/login",
  "http://localhost:3001/auth/callback",
  "https://contentos.us/login",
  "https://contentos.us/auth/callback",
]

[auth.password]
min_length = 6
require_number = false
require_lowercase = false
require_uppercase = false
require_special_char = false
