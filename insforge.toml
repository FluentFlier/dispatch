# Declarative InsForge config for Dispatch
# Apply: npx @insforge/cli config apply
# Note: auth.allowed_redirect_urls requires a newer backend (currently skipped on apply)

[auth]
require_email_verification = false
verify_email_method = "code"
reset_password_method = "code"

[auth.password]
min_length = 6
require_number = false
require_lowercase = false
require_uppercase = false
require_special_char = false

